<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- metas del sitio -->
  <title>Contacto - VetVerde Clínica Veterinaria</title>
  <meta name="keywords" content="contacto veterinaria, cita veterinaria, El Cerrito Valle del Cauca, VetVerde teléfono">
  <meta name="description" content="Contáctanos para agendar una cita o resolver tus dudas. VetVerde Clínica Veterinaria, El Cerrito, Valle del Cauca.">
  <meta name="author" content="VetVerde">
  <!-- bootstrap css -->
  <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
  <!-- style css -->
  <link rel="stylesheet" type="text/css" href="css/style.css">

  <!-- sección de encabezado inicio -->
  <div class="header_section background_bg">
    <div class="container-fluid">
      <div class="row header_top align-items-center">
        <div class="col-8 col-md-3">
          <div class="logo"><a href="index.html"><img src="images/logo.png" alt="VetVerde Logo"></a></div>
        </div>
        <div class="col-4 col-md-9">
          <div class="menu_text menu_text--nav">
            <button type="button" class="header_nav_toggle" aria-expanded="false" aria-controls="main_nav" aria-label="Abrir o cerrar menú">
              <span class="header_nav_toggle-bar" aria-hidden="true"></span>
              <span class="header_nav_toggle-bar" aria-hidden="true"></span>
              <span class="header_nav_toggle-bar" aria-hidden="true"></span>
            </button>
            <nav id="main_nav" class="header_nav" aria-label="Principal">
              <button type="button" class="header_nav_close" aria-label="Cerrar menú">&times;</button>
              <ul class="header_nav_list">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="services.html">Servicios</a></li>
                <li><a href="about.html">Nosotros</a></li>
                <li><a href="choose.html">¿Por Qué Elegirnos?</a></li>
                <li><a href="team.html">Equipo</a></li>
                <li><a href="contact.html">Contacto</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- sección de encabezado fin -->

  <!-- sección pie de página / contacto inicio -->
  <div class="footer_section layout_padding">
    <div class="container">
      <div class="footer_main">
        <div class="footer_left">
          <h1 class="contact_taital"><span>Contáctanos </span> <img src="images/icon-2.png" alt="icono"></h1>
        </div>
        <div class="footer_left">
          <div class="location_text"><a href="#"><img src="images/map-icon.png" alt="Dirección"><span
                class="padding_left_15">El Cerrito, Valle del Cauca</span></a></div>
        </div>
        <div class="footer_left">
          <div class="location_text"><a href="tel:123456789"><img src="images/call-icon.png" alt="Teléfono"><span class="padding_left_15">123456789</span></a></div>
        </div>
        <div class="footer_left">
          <div class="location_text"><a href="mailto:contacto@vetverde.mx"><img src="images/map-icon.png" alt="Email"><span
                class="padding_left_15">contacto@vetverde.mx</span></a></div>
        </div>
      </div>
      <div class="contact_section">
        <div class="row">
          <div class="col-md-6">
            <div class="mail_section">
              <input type="text" class="email_text" placeholder="Nombre" name="nombre">
              <input type="email" class="email_text" placeholder="Correo Electrónico" name="email">
              <input type="tel" class="email_text" placeholder="Número de Teléfono" name="telefono">
              <textarea class="massage_text" placeholder="Mensaje" rows="5" id="comment" name="mensaje"></textarea>
              <div class="send_bt"><a href="#">ENVIAR</a></div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="map_main">
              <div class="map-responsive">
                <iframe title="Ubicación El Cerrito, Valle del Cauca"
                  src="https://maps.google.com/maps?q=El+Cerrito%2C+Valle+del+Cauca%2C+Colombia&amp;hl=es&amp;z=13&amp;output=embed"
                  width="600" height="280" frameborder="0" style="border:0; width: 100%;" allowfullscreen loading="lazy"></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- sección pie de página / contacto fin -->

  <!-- sección derechos de autor inicio -->
  <div class="copyright_section">

      <p class="copyright_text">© 2024 Todos los derechos reservados | <a href="index.html">VetVerde Clínica Veterinaria</a> | El Cerrito, Valle del Cauca</p>
    </div>
  </div>
  <!-- sección derechos de autor fin -->

  <!-- archivos Javascript -->
  <script src="js/jquery.min.js"></script>
  <script src="js/popper.min.js"></script>

  <script src="js/plugin.js"></script>

  <script src="js/jquery.mCustomScrollbar.concat.min.js"></script>
  <script src="js/custom.js"></script>
  <!-- javascript -->
  <script src="js/owl.carousel.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.js"></script>
  <script>
    $(document).ready(function () {
      $(".fancybox").fancybox({
        openEffect: "none",
        closeEffect: "none"
      });

      $(".zoom").hover(function () {
        $(this).addClass('transition');
      }, function () {
        $(this).removeClass('transition');
      });
    });
  </script>
